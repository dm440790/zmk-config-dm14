CONFIG_ZMK_SLEEP=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_KEYBOARD_NAME="Caldera"
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

# Explicitly enable USB HID — under Zephyr 4.1's new board-extension model,
# this is no longer guaranteed to default on for every board/revision.
CONFIG_ZMK_USB=y
CONFIG_USB_DEVICE_STACK=y